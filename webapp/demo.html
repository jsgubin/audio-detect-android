<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时环境音识别系统 - 纯前端离线版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            text-align: center;
        }

        .subtitle {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 24px;
        }

        .badge-offline {
            display: inline-block;
            background: #7c3aed;
            color: #fff;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 700;
            margin-left: 10px;
            vertical-align: middle;
        }

        .main-panel {
            width: 100%;
            max-width: 900px;
            background: #1e293b;
            border-radius: 16px;
            border: 1px solid #334155;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .notice-bar {
            background: #1e3a5f;
            color: #93c5fd;
            padding: 10px 20px;
            text-align: center;
            font-size: 0.85rem;
            border-bottom: 1px solid #334155;
        }

        .notice-bar a {
            color: #60a5fa;
            text-decoration: underline;
        }

        .viz-area {
            position: relative;
            height: 180px;
            background: #0f172a;
            border-bottom: 1px solid #334155;
        }

        #waveCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .viz-overlay {
            position: absolute;
            top: 12px;
            left: 16px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            background: #334155;
            color: #94a3b8;
            transition: all 0.3s;
        }

        .status-badge.active {
            background: #064e3b;
            color: #34d399;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #94a3b8;
            transition: all 0.3s;
        }

        .status-badge.active .status-dot {
            background: #34d399;
            box-shadow: 0 0 8px #34d399;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .volume-bar-container {
            position: absolute;
            bottom: 12px;
            right: 16px;
            width: 120px;
            height: 6px;
            background: #334155;
            border-radius: 3px;
            overflow: hidden;
        }

        .volume-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #22c55e, #eab308, #ef4444);
            border-radius: 3px;
            transition: width 0.1s linear;
        }

        .volume-label {
            position: absolute;
            bottom: 22px;
            right: 16px;
            font-size: 0.7rem;
            color: #64748b;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 16px;
            padding: 20px;
            border-bottom: 1px solid #334155;
            background: #1e293b;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .control-group label {
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        select, input[type="number"] {
            background: #0f172a;
            border: 1px solid #475569;
            color: #e2e8f0;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            min-width: 160px;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus, input[type="number"]:focus {
            border-color: #38bdf8;
        }

        input[type="number"] {
            width: 80px;
            min-width: 80px;
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, #059669, #10b981);
            color: white;
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #dc2626, #ef4444);
            color: white;
            box-shadow: 0 4px 14px rgba(239, 68, 68, 0.3);
        }

        .btn-danger:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.4);
        }

        .btn-mock {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: white;
            box-shadow: 0 4px 14px rgba(124, 58, 237, 0.3);
        }

        .btn-mock:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.4);
        }

        .spacer { flex: 1; }

        .content {
            display: grid;
            grid-template-columns: 1fr 280px;
            min-height: 350px;
        }

        @media (max-width: 700px) {
            .content { grid-template-columns: 1fr; }
        }

        .log-section {
            padding: 20px;
            border-right: 1px solid #334155;
        }

        @media (max-width: 700px) {
            .log-section { border-right: none; border-bottom: 1px solid #334155; }
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 0.85rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 700;
        }

        .clear-btn {
            font-size: 0.75rem;
            color: #64748b;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .clear-btn:hover {
            color: #e2e8f0;
            background: #334155;
        }

        .log-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 400px;
            overflow-y: auto;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #475569;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 12px;
            opacity: 0.3;
        }

        .log-entry {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 10px;
            animation: slideIn 0.4s ease-out;
            transition: all 0.2s;
        }

        .log-entry:hover {
            border-color: #334155;
            transform: translateX(4px);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .log-time {
            font-size: 0.75rem;
            color: #64748b;
            font-family: monospace;
            min-width: 72px;
        }

        .log-icon {
            font-size: 1.4rem;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1e293b;
            border-radius: 8px;
        }

        .log-info {
            flex: 1;
        }

        .log-name {
            font-weight: 600;
            color: #f1f5f9;
            font-size: 0.95rem;
        }

        .log-prob {
            display: inline-block;
            margin-top: 2px;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            font-family: monospace;
        }

        .prob-high { background: #064e3b; color: #34d399; }
        .prob-mid { background: #713f12; color: #fbbf24; }
        .prob-low { background: #7f1d1d; color: #f87171; }

        .stats-panel {
            padding: 20px;
            background: #0f172a;
        }

        .stat-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 12px;
        }

        .stat-label {
            font-size: 0.7rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #f8fafc;
        }

        .stat-value.accent { color: #38bdf8; }

        .class-list {
            margin-top: 16px;
        }

        .class-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 6px;
        }

        .class-item:nth-child(1) { background: rgba(239, 68, 68, 0.1); color: #f87171; }
        .class-item:nth-child(2) { background: rgba(249, 115, 22, 0.1); color: #fb923c; }
        .class-item:nth-child(3) { background: rgba(234, 179, 8, 0.1); color: #facc15; }
        .class-item:nth-child(4) { background: rgba(34, 197, 94, 0.1); color: #4ade80; }
        .class-item:nth-child(5) { background: rgba(59, 130, 246, 0.1); color: #60a5fa; }
        .class-item:nth-child(6) { background: rgba(168, 85, 247, 0.1); color: #c084fc; }

        .class-count {
            font-weight: 700;
            font-family: monospace;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body>
    <h1>🎤 实时环境音识别系统 <span class="badge-offline">纯前端离线版</span></h1>
    <div class="subtitle">无需 Python 后端，双击即可运行，支持麦克风实时侦测</div>

    <div class="main-panel">
        <div class="notice-bar">
            💡 这是 <b>离线演示版</b>，识别结果由本地模拟算法产生。如需真实模型推理，请运行 <a href="#" onclick="alert('请运行 webapp\\start_windows.bat 启动完整服务')">start_windows.bat</a>
        </div>

        <div class="viz-area">
            <canvas id="waveCanvas"></canvas>
            <div class="viz-overlay">
                <div class="status-badge" id="statusBadge">
                    <div class="status-dot"></div>
                    <span id="statusText">就绪</span>
                </div>
            </div>
            <div class="volume-label">输入音量</div>
            <div class="volume-bar-container">
                <div class="volume-bar" id="volumeBar"></div>
            </div>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>识别引擎</label>
                <select id="modelSelect">
                    <option value="efficientat">EfficientAT V3 (推荐)</option>
                    <option value="panns">PANNs Cnn6</option>
                    <option value="mobilenet">MobileNetV1</option>
                </select>
            </div>
            <div class="control-group">
                <label>静音阈值</label>
                <input type="number" id="vadThreshold" value="0.03" step="0.01" min="0" max="0.20">
            </div>
            <div class="control-group">
                <label>置信度阈值</label>
                <input type="number" id="confThreshold" value="0.60" step="0.05" min="0.30" max="0.95">
            </div>
            <div class="spacer"></div>
            <button class="btn btn-primary" id="startBtn">▶ 开始监听</button>
            <button class="btn btn-danger" id="stopBtn" disabled>⏹ 停止</button>
            <button class="btn btn-mock" id="mockBtn" title="不获取麦克风，仅模拟识别结果">🔮 模拟</button>
        </div>

        <div class="content">
            <div class="log-section">
                <div class="section-header">
                    <div class="section-title">📋 检测记录</div>
                    <button class="clear-btn" id="clearBtn">清空</button>
                </div>
                <div class="log-container" id="logContainer">
                    <div class="empty-state">
                        <div class="empty-state-icon">🔇</div>
                        <div>等待开始监听...</div>
                        <div style="font-size:0.8rem; margin-top:8px; color:#475569">点击「开始监听」使用麦克风，或「模拟」体验自动识别</div>
                    </div>
                </div>
            </div>
            <div class="stats-panel">
                <div class="stat-card">
                    <div class="stat-label">总检测次数</div>
                    <div class="stat-value accent" id="totalCount">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">当前引擎</div>
                    <div class="stat-value" id="currentEngine" style="font-size:1rem;">-</div>
                </div>
                <div class="class-list">
                    <div class="stat-label" style="margin-bottom:8px;">各类别统计</div>
                    <div class="class-item">🚨 警报 <span class="class-count" id="cnt-alarm">0</span></div>
                    <div class="class-item">👶 婴儿啼哭 <span class="class-count" id="cnt-baby_cry">0</span></div>
                    <div class="class-item">🚗 汽车鸣笛 <span class="class-count" id="cnt-car_horn">0</span></div>
                    <div class="class-item">🚪 门铃 <span class="class-count" id="cnt-doorbell">0</span></div>
                    <div class="class-item">💥 玻璃破碎 <span class="class-count" id="cnt-glass_shatter">0</span></div>
                    <div class="class-item">🔫 枪声 <span class="class-count" id="cnt-gun_shot">0</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============ 状态 ============
        let stream = null;
        let audioContext = null;
        let analyser = null;
        let isRecording = false;
        let isMockMode = false;
        let totalDetections = 0;
        let mockInterval = null;
        const classCounts = { alarm:0, baby_cry:0, car_horn:0, doorbell:0, glass_shatter:0, gun_shot:0 };

        // ============ DOM ============
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const mockBtn = document.getElementById('mockBtn');
        const statusBadge = document.getElementById('statusBadge');
        const statusText = document.getElementById('statusText');
        const modelSelect = document.getElementById('modelSelect');
        const vadInput = document.getElementById('vadThreshold');
        const confInput = document.getElementById('confThreshold');
        const logContainer = document.getElementById('logContainer');
        const clearBtn = document.getElementById('clearBtn');
        const canvas = document.getElementById('waveCanvas');
        const ctx = canvas.getContext('2d');
        const volumeBar = document.getElementById('volumeBar');

        const trans = {
            alarm: { name:'🚨 警报声', icon:'🚨' },
            baby_cry: { name:'👶 婴儿啼哭', icon:'👶' },
            car_horn: { name:'🚗 汽车鸣笛', icon:'🚗' },
            doorbell: { name:'🚪 门铃声', icon:'🚪' },
            glass_shatter: { name:'💥 玻璃破碎', icon:'💥' },
            gun_shot: { name:'🔫 枪声', icon:'🔫' }
        };
        const classKeys = Object.keys(trans);

        modelSelect.addEventListener('change', () => {
            confInput.value = (modelSelect.value === 'mobilenet') ? '0.65' : '0.60';
        });

        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width * window.devicePixelRatio;
            canvas.height = rect.height * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // ============ 开始监听（真实麦克风） ============
        startBtn.addEventListener('click', async () => {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new AudioContext();
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048;
                analyser.smoothingTimeConstant = 0.8;
                source.connect(analyser);

                isRecording = true; isMockMode = false;
                startBtn.disabled = true; stopBtn.disabled = false; mockBtn.disabled = true;
                statusBadge.classList.add('active');
                statusText.textContent = '实时监听中';
                document.getElementById('currentEngine').textContent = modelSelect.options[modelSelect.selectedIndex].text;

                drawVisualizer();
                detectLoop();
            } catch (err) {
                alert('无法访问麦克风: ' + err.message + '\n\n提示：由于安全限制，从文件直接打开时浏览器可能拒绝麦克风。建议：\n1. 使用 start_windows.bat 启动服务后访问 http://localhost:8000\n2. 或点击「模拟」按钮体验无麦克风版本');
            }
        });

        // ============ 模拟模式（无需麦克风） ============
        mockBtn.addEventListener('click', () => {
            if (isMockMode) return;
            isRecording = true; isMockMode = true;
            startBtn.disabled = true; stopBtn.disabled = false; mockBtn.disabled = true;
            statusBadge.classList.add('active');
            statusText.textContent = '模拟侦测中';
            document.getElementById('currentEngine').textContent = modelSelect.options[modelSelect.selectedIndex].text + ' (模拟)';

            drawMockVisualizer();
            detectLoop();

            // 模拟模式：每 2-6 秒随机产生一个识别结果
            scheduleNextMock();
        });

        function scheduleNextMock() {
            if (!isMockMode || !isRecording) return;
            const delay = 2000 + Math.random() * 4000;
            mockInterval = setTimeout(() => {
                if (!isMockMode || !isRecording) return;
                const cls = classKeys[Math.floor(Math.random() * classKeys.length)];
                const prob = 0.55 + Math.random() * 0.40;
                addLogEntry(cls, prob);
                scheduleNextMock();
            }, delay);
        }

        // ============ 停止 ============
        stopBtn.addEventListener('click', () => {
            isRecording = false; isMockMode = false;
            if (mockInterval) { clearTimeout(mockInterval); mockInterval = null; }
            if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
            if (audioContext) { audioContext.close(); audioContext = null; }

            startBtn.disabled = false; stopBtn.disabled = true; mockBtn.disabled = false;
            statusBadge.classList.remove('active');
            statusText.textContent = '已暂停';
            volumeBar.style.width = '0%';
        });

        clearBtn.addEventListener('click', () => {
            logContainer.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🔇</div><div>等待开始监听...</div><div style="font-size:0.8rem; margin-top:8px; color:#475569">点击「开始监听」使用麦克风，或「模拟」体验自动识别</div></div>`;
            totalDetections = 0;
            for (const k in classCounts) classCounts[k] = 0;
            updateStats();
        });

        // ============ 真实可视化 ============
        function drawVisualizer() {
            if (!isRecording || !analyser || isMockMode) return;
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteTimeDomainData(dataArray);

            const w = canvas.width / window.devicePixelRatio;
            const h = canvas.height / window.devicePixelRatio;
            ctx.clearRect(0, 0, w, h);

            ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(0, h/2); ctx.lineTo(w, h/2); ctx.stroke();

            ctx.lineWidth = 2; ctx.strokeStyle = '#38bdf8';
            ctx.shadowColor = '#38bdf8'; ctx.shadowBlur = 8;
            ctx.beginPath();

            const sliceWidth = w / bufferLength;
            let x = 0, sum = 0;
            for (let i = 0; i < bufferLength; i++) {
                const v = dataArray[i] / 128.0 - 1.0;
                sum += v * v;
                const y = h/2 + v * (h/2 - 10);
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                x += sliceWidth;
            }
            ctx.stroke(); ctx.shadowBlur = 0;

            const rms = Math.sqrt(sum / bufferLength);
            const db = 20 * Math.log10(rms + 0.0001);
            const pct = Math.min(100, Math.max(0, (db + 60) / 60 * 100));
            volumeBar.style.width = pct + '%';

            requestAnimationFrame(drawVisualizer);
        }

        // ============ 模拟可视化 ============
        let mockPhase = 0;
        function drawMockVisualizer() {
            if (!isRecording || !isMockMode) return;
            const w = canvas.width / window.devicePixelRatio;
            const h = canvas.height / window.devicePixelRatio;
            ctx.clearRect(0, 0, w, h);

            ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(0, h/2); ctx.lineTo(w, h/2); ctx.stroke();

            ctx.lineWidth = 2; ctx.strokeStyle = '#a855f7';
            ctx.shadowColor = '#a855f7'; ctx.shadowBlur = 8;
            ctx.beginPath();

            const sliceWidth = w / 256;
            let x = 0, sum = 0;
            for (let i = 0; i < 256; i++) {
                const v = Math.sin(mockPhase + i * 0.1) * (0.2 + Math.random() * 0.15);
                sum += v * v;
                const y = h/2 + v * (h/2 - 10);
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                x += sliceWidth;
            }
            mockPhase += 0.15;
            ctx.stroke(); ctx.shadowBlur = 0;

            const rms = Math.sqrt(sum / 256);
            const db = 20 * Math.log10(rms + 0.0001);
            const pct = Math.min(100, Math.max(0, (db + 60) / 60 * 100));
            volumeBar.style.width = pct + '%';

            requestAnimationFrame(drawMockVisualizer);
        }

        // ============ 侦测循环（真实模式：基于音量） ============
        function detectLoop() {
            if (!isRecording) return;
            if (!isMockMode && analyser) {
                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);
                analyser.getByteTimeDomainData(dataArray);
                let sum = 0;
                for (let i = 0; i < bufferLength; i++) {
                    const v = dataArray[i] / 128.0 - 1.0;
                    sum += v * v;
                }
                const rms = Math.sqrt(sum / bufferLength);
                const vad = parseFloat(vadInput.value) || 0.03;
                const conf = parseFloat(confInput.value) || 0.60;

                // 简单模拟：音量高时，以一定概率触发识别
                if (rms > vad && Math.random() < 0.08) {
                    const cls = classKeys[Math.floor(Math.random() * classKeys.length)];
                    const prob = conf + Math.random() * (1 - conf);
                    addLogEntry(cls, prob);
                }
            }
            setTimeout(detectLoop, 3000);
        }

        // ============ 添加日志 ============
        function addLogEntry(className, prob) {
            if (logContainer.querySelector('.empty-state')) logContainer.innerHTML = '';
            const info = trans[className] || { name: className, icon: '🔊' };
            const time = new Date().toLocaleTimeString('zh-CN', { hour12: false });
            let probClass = 'prob-low';
            if (prob >= 0.85) probClass = 'prob-high';
            else if (prob >= 0.65) probClass = 'prob-mid';

            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `
                <div class="log-time">${time}</div>
                <div class="log-icon">${info.icon}</div>
                <div class="log-info">
                    <div class="log-name">${info.name}</div>
                    <span class="log-prob ${probClass}">${(prob*100).toFixed(1)}%</span>
                </div>
            `;
            logContainer.prepend(entry);

            while (logContainer.children.length > 50) {
                logContainer.removeChild(logContainer.lastChild);
            }
            totalDetections++;
            if (classCounts[className] !== undefined) classCounts[className]++;
            updateStats();
        }

        function updateStats() {
            document.getElementById('totalCount').textContent = totalDetections;
            for (const [cls, cnt] of Object.entries(classCounts)) {
                const el = document.getElementById('cnt-' + cls);
                if (el) el.textContent = cnt;
            }
        }
    </script>
</body>
