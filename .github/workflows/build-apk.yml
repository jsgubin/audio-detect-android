name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Android SDK
      run: |
        ANDROID_HOME="$HOME/android-sdk"
        mkdir -p "$ANDROID_HOME"

        # Download cmdline-tools
        cd /tmp
        curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o cmdline-tools.zip
        unzip -q cmdline-tools.zip
        mkdir -p "$ANDROID_HOME/cmdline-tools"
        mv cmdline-tools "$ANDROID_HOME/cmdline-tools/latest"

        export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"

        # Create licenses directory and accept all licenses silently by writing the hashes directly
        mkdir -p "$ANDROID_HOME/licenses"
        echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > "$ANDROID_HOME/licenses/android-sdk-license"
        echo "84831b9409646a918e30573bab4c9c91346d8abd" > "$ANDROID_HOME/licenses/android-sdk-preview-license"
        echo "d56f5187479451eabf01fb78af6dfcb131a6481e" > "$ANDROID_HOME/licenses/android-sdk-arm-dbt-license"
        echo "601085b94cd77c31fa3d309b72fe98a1e1e1e5a6" > "$ANDROID_HOME/licenses/android-googletv-license"

        # Install packages directly (no --licenses interaction needed)
        sdkmanager --sdk_root="$ANDROID_HOME" "build-tools;34.0.0" "platforms;android-34"

        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
        echo "PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH" >> $GITHUB_PATH

    - name: Download Gradle wrapper
      run: |
        cd android
        curl -L https://services.gradle.org/distributions/gradle-8.4-bin.zip -o gradle.zip
        unzip -q gradle.zip
        ./gradle-8.4/bin/gradle wrapper --gradle-version 8.4
        ls -la gradlew
        chmod +x gradlew

    - name: Reconvert models for PyTorch Lite
      run: |
        pip install torch==2.2.0+cpu --index-url https://download.pytorch.org/whl/cpu
        python3 << 'EOF'
        import torch
        import os
        import sys
        import zipfile

        models_dir = "android/app/src/main/assets/models"
        models = ["efficientat_lite.pt", "panns_cnn6.pt", "mobilenetv1.pt"]

        all_ok = True
        for name in models:
            path = os.path.join(models_dir, name)
            if not os.path.exists(path):
                print(f"SKIP: {path} not found")
                continue
            size = os.path.getsize(path)
            if size < 1000:
                print(f"SKIP: {name} is too small ({size} bytes), likely a Git LFS pointer")
                continue
            print(f"Converting {name} ({size} bytes)...")
            try:
                model = torch.jit.load(path, map_location="cpu")
                model.eval()
                model._save_for_lite_interpreter(path)
                print(f"  OK: {name} re-saved for lite interpreter")

                # 验证转换后的文件包含 bytecode.pkl
                with zipfile.ZipFile(path, 'r') as zf:
                    namelist = zf.namelist()
                    has_bytecode = 'bytecode.pkl' in namelist or any('bytecode' in n for n in namelist)
                    print(f"  Files: {namelist[:5]}...")
                    print(f"  Has bytecode: {has_bytecode}")
                    if not has_bytecode:
                        print(f"  WARNING: No bytecode found in {name}")
                        all_ok = False
            except Exception as e:
                print(f"  FAIL: {e}")
                all_ok = False

        if not all_ok:
            sys.exit(1)
        print("All models converted successfully")
        EOF

    - name: Build APK
      run: |
        echo "sdk.dir=$ANDROID_HOME" > android/local.properties
        cd android
        ./gradlew assembleDebug --no-daemon --stacktrace 2>&1

    - name: Upload debug APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error

    - name: Upload build outputs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-debug-output
        path: android/app/build/
        if-no-files-found: warn
