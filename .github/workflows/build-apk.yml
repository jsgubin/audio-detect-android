name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'build-tools;34.0.0 platforms;android-34'

    - name: Download Gradle wrapper
      run: |
        cd android
        curl -L https://services.gradle.org/distributions/gradle-8.4-bin.zip -o gradle.zip
        unzip -q gradle.zip
        ./gradle-8.4/bin/gradle wrapper --gradle-version 8.4
        ls -la gradlew
        chmod +x gradlew

    - name: Build APK
      run: |
        cd android
        ./gradlew assembleDebug --no-daemon --stacktrace || true
        echo "=== GRADLE EXIT CODE: $? ==="

    - name: Print all errors from build
      if: always()
      run: |
        echo "=== SEARCHING FOR BUILD ERRORS ==="
        cd android
        # 查找所有编译日志
        find . -path "*/build/outputs/logs/*" -name "*.log" -type f 2>/dev/null | head -20
        # 查找 Kotlin 编译器日志
        find . -path "*/build/kotlin/*" -type f 2>/dev/null | head -20
        # 打印 gradle 错误
        if [ -f build.log ]; then
          echo "=== build.log ==="
          cat build.log | tail -100
        fi
        # 打印所有 stderr 日志
        for f in $(find app/build -name "*.log" -type f 2>/dev/null); do
          echo "=== LOG: $f ==="
          cat "$f" | tail -50
        done
        # 打印所有 .xml 报告
        for f in $(find app/build/reports -name "*.xml" -type f 2>/dev/null); do
          echo "=== REPORT: $f ==="
          cat "$f" | tail -50
        done

    - name: Upload debug APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error

    - name: Upload entire build directory on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-directory
        path: android/app/build/
        if-no-files-found: warn
