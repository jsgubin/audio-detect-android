name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Android SDK and accept licenses
      run: |
        ANDROID_SDK="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
        CMDLINE_TOOLS="${ANDROID_SDK}/cmdline-tools/latest/bin"
        
        # 如果 cmdline-tools 不存在，自动下载
        if [ ! -f "${CMDLINE_TOOLS}/sdkmanager" ]; then
          mkdir -p "${ANDROID_SDK}/cmdline-tools"
          cd "${ANDROID_SDK}/cmdline-tools"
          curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
        fi
        
        # 确保环境变量和 PATH
        echo "${ANDROID_SDK}/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "ANDROID_SDK_ROOT=${ANDROID_SDK}" >> $GITHUB_ENV
        echo "ANDROID_HOME=${ANDROID_SDK}" >> $GITHUB_ENV
        
        # 接受所有许可证并安装所需包
        yes | "${ANDROID_SDK}/cmdline-tools/latest/bin/sdkmanager" --sdk_root="${ANDROID_SDK}" --licenses
        "${ANDROID_SDK}/cmdline-tools/latest/bin/sdkmanager" --sdk_root="${ANDROID_SDK}" "build-tools;34.0.0" "platforms;android-34"

    - name: Download Gradle wrapper
      run: |
        cd android
        curl -L https://services.gradle.org/distributions/gradle-8.4-bin.zip -o gradle.zip
        unzip -q gradle.zip
        ./gradle-8.4/bin/gradle wrapper --gradle-version 8.4
        ls -la gradlew
        chmod +x gradlew

    - name: Reconvert models for PyTorch Lite
      run: |
        pip install torch==2.1.0 --index-url https://download.pytorch.org/whl/cpu
        python3 << 'EOF'
        import torch
        import os

        models_dir = "android/app/src/main/assets/models"
        models = ["efficientat_lite.pt", "panns_cnn6.pt", "mobilenetv1.pt"]

        for name in models:
            path = os.path.join(models_dir, name)
            if not os.path.exists(path):
                print(f"SKIP: {path} not found")
                continue
            print(f"Converting {name} ...")
            try:
                model = torch.jit.load(path, map_location="cpu")
                model.eval()
                # Overwrite with lite-compatible format
                model._save_for_lite_interpreter(path)
                print(f"  OK: {name} re-saved for lite interpreter")
            except Exception as e:
                print(f"  FAIL: {e}")
                raise
        print("All models converted successfully")
        EOF

    - name: Build APK
      run: |
        cd android
        ./gradlew assembleDebug --no-daemon --stacktrace 2>&1

    - name: Upload debug APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error

    - name: Upload build outputs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-debug-output
        path: android/app/build/
        if-no-files-found: warn
