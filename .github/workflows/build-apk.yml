name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'build-tools;34.0.0 platforms;android-34'

    - name: Download Gradle wrapper
      run: |
        cd android
        curl -L https://services.gradle.org/distributions/gradle-8.4-bin.zip -o gradle.zip
        unzip -q gradle.zip
        ./gradle-8.4/bin/gradle wrapper --gradle-version 8.4
        ls -la gradlew
        chmod +x gradlew

    - name: Build APK
      shell: bash
      run: |
        cd android
        ./gradlew assembleDebug --no-daemon --stacktrace > build.log 2>&1
        cat build.log
        if grep -q "BUILD FAILED" build.log; then
          echo "=== DETAILED ERROR LOGS ==="
          find app/build -name "*.log" -type f 2>/dev/null | while read f; do
            echo "--- $f ---"
            cat "$f"
          done
          exit 1
        fi

    - name: Upload debug APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error

    - name: Upload build outputs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-debug-output
        path: |
          android/build.log
          android/app/build/
        if-no-files-found: warn
